<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON DRIFT v2.0</title>
    <style>
        body { margin: 0; overflow: hidden; background: #111; font-family: monospace; color: white; touch-action: none; }
        canvas { display: block; }
        #ui { position: absolute; top: 20px; left: 20px; pointer-events: none; }
        .stat { font-size: 24px; font-weight: bold; text-shadow: 0 0 10px rgba(0,255,255,0.5); }
        #menu { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; background: rgba(0,0,0,0.8); padding: 40px; border-radius: 10px; border: 2px solid #0ff; }
        button { background: #0ff; border: none; padding: 15px 30px; font-size: 20px; cursor: pointer; font-weight: bold; margin-top: 20px; }
        button:hover { background: #fff; box-shadow: 0 0 20px #0ff; }
    </style>
</head>
<body>
    <div id="ui">
        <div class="stat">DIST: <span id="distVal">0</span>m</div>
        <div class="stat" style="color:#ff0">DATA: <span id="dataVal">0</span></div>
    </div>
    <div id="menu">
        <h1>NEON DRIFT</h1>
        <p>Уворачивайся от красных блоков. Собирай синие пакеты.</p>
        <button onclick="startGame()">START</button>
    </div>
    <canvas id="c"></canvas>

<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');
let w, h;
function resize() { w = c.width = window.innerWidth; h = c.height = window.innerHeight; }
window.addEventListener('resize', resize); resize();

let state = { play: false, dist: 0, data: 0, speed: 5, objs: [], particles: [] };
let player = { x: 0, y: 0, w: 40, h: 60, vx: 0 };
let keys = {};

document.addEventListener('keydown', e => keys[e.code] = true);
document.addEventListener('keyup', e => keys[e.code] = false);
c.addEventListener('touchstart', e => {
    if(e.touches[0].clientX < w/2) keys['ArrowLeft'] = true;
    else keys['ArrowRight'] = true;
});
c.addEventListener('touchend', () => keys = {});

function startGame() {
    state = { play: true, dist: 0, data: 0, speed: 6, objs: [], particles: [] };
    player.x = w/2 - 20; player.y = h - 150; player.vx = 0;
    document.getElementById('menu').style.display = 'none';
    loop();
}

function spawnObj() {
    const type = Math.random() > 0.3 ? 'enemy' : 'data';
    state.objs.push({
        x: Math.random() * (w - 50), y: -100, w: 50, h: 50, type: type, active: true
    });
}

function update() {
    if (!state.play) return;
    
    // Player Physics
    if (keys['ArrowLeft']) player.vx -= 0.8;
    if (keys['ArrowRight']) player.vx += 0.8;
    player.vx *= 0.9;
    player.x += player.vx;
    if (player.x < 0) player.x = 0;
    if (player.x > w - player.w) player.x = w - player.w;

    // Game Progress
    state.speed += 0.005;
    state.dist += state.speed / 10;
    if (Math.random() < 0.03) spawnObj();

    // Objects
    state.objs.forEach(o => {
        o.y += state.speed;
        // Collision
        if (o.active && player.x < o.x + o.w && player.x + player.w > o.x && player.y < o.y + o.h && player.y + player.h > o.y) {
            if (o.type === 'data') {
                state.data++;
                o.active = false;
            } else {
                gameOver();
            }
        }
    });
    state.objs = state.objs.filter(o => o.y < h && o.active);

    document.getElementById('distVal').innerText = Math.floor(state.dist);
    document.getElementById('dataVal').innerText = state.data;
}

function draw() {
    ctx.fillStyle = '#111';
    ctx.fillRect(0, 0, w, h);
    
    // Road lines
    ctx.strokeStyle = '#333';
    ctx.setLineDash([40, 40]);
    ctx.lineDashOffset = -state.dist * 10;
    ctx.beginPath(); ctx.moveTo(w/2, 0); ctx.lineTo(w/2, h); ctx.stroke();

    // Player
    ctx.fillStyle = '#0ff';
    ctx.shadowBlur = 20; ctx.shadowColor = '#0ff';
    ctx.fillRect(player.x, player.y, player.w, player.h);
    ctx.shadowBlur = 0;

    // Objects
    state.objs.forEach(o => {
        ctx.fillStyle = o.type === 'enemy' ? '#f05' : '#0af';
        ctx.shadowColor = ctx.fillStyle; ctx.shadowBlur = 10;
        ctx.fillRect(o.x, o.y, o.w, o.h);
    });
    ctx.shadowBlur = 0;
}

function loop() {
    if (!state.play) return;
    update();
    draw();
    requestAnimationFrame(loop);
}

function gameOver() {
    state.play = false;
    document.getElementById('menu').style.display = 'block';
    document.querySelector('#menu h1').innerText = "CRASHED!";
}
</script>
</body>
</html>
