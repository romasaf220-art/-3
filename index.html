<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEON DRIFT: DATA RUNNER</title>
    <style>
        :root { --bg: #050505; --accent: #00ff9d; --warn: #ff0055; --text: #fff; }
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        
        .crt::before { content: " "; display: block; position: absolute; inset: 0; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06)); z-index: 2; background-size: 100% 2px, 3px 100%; pointer-events: none; animation: flicker 0.15s infinite; }
        @keyframes flicker { 0% { opacity: 0.97; } 50% { opacity: 1; } 100% { opacity: 0.98; } }

        canvas { position: absolute; top: 0; left: 0; z-index: 1; }
        
        .ui-layer { position: relative; z-index: 10; width: 100%; max-width: 600px; height: 100%; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; pointer-events: none; }
        .hud-top { display: flex; justify-content: space-between; font-size: 1.2em; font-weight: bold; text-shadow: 0 0 10px currentColor; }
        .score-val { color: var(--accent); }
        
        .center-msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; pointer-events: auto; background: rgba(5,5,5,0.9); padding: 40px; border: 1px solid #333; }
        .btn-start { background: transparent; border: 2px solid var(--accent); color: var(--accent); padding: 15px 40px; font-size: 1.5em; font-family: inherit; cursor: pointer; transition: 0.2s; text-transform: uppercase; letter-spacing: 3px; box-shadow: 0 0 20px rgba(0,255,157,0.2); margin-top: 20px; }
        .btn-start:hover { background: var(--accent); color: #000; box-shadow: 0 0 40px rgba(0,255,157,0.6); }

        .controls-hint { text-align: center; font-size: 0.8em; color: #555; margin-bottom: 20px; opacity: 0.7; }
        .mobile-controls { display: none; grid-template-columns: 1fr 1fr; gap: 20px; width: 100%; height: 100px; pointer-events: auto; }
        .m-btn { border: 2px solid var(--accent); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 2em; font-weight: bold; opacity: 0.8; background: rgba(0,255,157,0.1); }
        .m-btn:active { transform: scale(0.95); opacity: 1; background: var(--accent); color: #000; }

        @media (max-width: 768px) {
            .controls-hint { display: none; }
            .mobile-controls { display: grid; }
        }
    </style>
</head>
<body class="crt">

<canvas id="gameCanvas"></canvas>

<div class="ui-layer">
    <div class="hud-top">
        <div>DIST: <span class="score-val" id="distDisplay">0m</span></div>
        <div>SPEED: <span class="score-val" id="speedDisplay">0 km/h</span></div>
    </div>

    <div class="center-msg" id="startScreen">
        <h1 style="font-size: 2em; margin-bottom: 10px; text-shadow: 0 0 20px var(--accent);">NEON DRIFT</h1>
        <p style="margin-bottom: 20px; color: #aaa; font-size: 0.9em;">AVOID FIREWALLS. DRIFT FOR POINTS.</p>
        <button class="btn-start" onclick="startGame()">START ENGINE</button>
    </div>

    <div class="center-msg" id="gameOverScreen" style="display: none;">
        <h1 style="font-size: 2em; margin-bottom: 10px; color: var(--warn); text-shadow: 0 0 20px var(--warn);">CRASHED</h1>
        <p style="margin-bottom: 10px;">DISTANCE: <span id="finalDist" style="color:var(--accent)">0m</span></p>
        <p style="margin-bottom: 20px; font-size: 0.9em; color:#aaa;">BEST: <span id="bestDist">0m</span></p>
        <button class="btn-start" onclick="startGame()">RETRY</button>
    </div>

    <div class="controls-hint">USE [←] [→] ARROWS OR TAP SIDES TO STEER</div>

    <div class="mobile-controls">
        <div class="m-btn" ontouchstart="input.left=true" ontouchend="input.left=false">◀</div>
        <div class="m-btn" ontouchstart="input.right=true" ontouchend="input.right=false">▶</div>
    </div>
</div>

<script>
/** NEON DRIFT ENGINE v1.0 **/
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let width, height;

// Game State
let state = {
    isPlaying: false,
    dist: 0,
    speed: 0,
    maxSpeed: 15,
    bestDist: parseInt(localStorage.getItem('neon_drift_best') || '0'),
    obstacles: [],
    particles: [],
    roadOffset: 0
};

const input = { left: false, right: false };

// Car Physics
const car = {
    x: 0, y: 0, angle: 0, vx: 0, vy: 0, driftFactor: 0.95
};

function resize() {
    width = window.innerWidth;
    height = window.innerHeight;
    canvas.width = width;
    canvas.height = height;
    car.x = width / 2;
    car.y = height * 0.8;
}
window.addEventListener('resize', resize);
resize();

document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft') input.left = true;
    if (e.key === 'ArrowRight') input.right = true;
});
document.addEventListener('keyup', e => {
    if (e.key === 'ArrowLeft') input.left = false;
    if (e.key === 'ArrowRight') input.right = false;
});

// Particle System for Drift Trails
class Particle {
    constructor(x, y, c) {
        this.x = x; this.y = y; this.c = c;
        this.life = 1.0;
        this.size = Math.random() * 4 + 2;
    }
    update() { this.life -= 0.02; this.size *= 0.95; }
    draw() {
        ctx.globalAlpha = this.life;
        ctx.fillStyle = this.c;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
    }
}

function spawnTrail(x, y) {
    state.particles.push(new Particle(x, y, '#00ff9d'));
}

// Obstacles
class Obstacle {
    constructor() {
        this.w = 60;
        this.h = 60;
        this.x = Math.random() * (width - this.w);
        this.y = -100;
        this.type = Math.random() > 0.5 ? 'firewall' : 'data_block';
    }
    update() {
        this.y += state.speed * 1.5; // Move down based on car speed
    }
    draw() {
        ctx.shadowBlur = 10;
        ctx.shadowColor = this.type === 'firewall' ? '#ff0055' : '#00ccff';
        ctx.fillStyle = this.type === 'firewall' ? '#ff0055' : '#00ccff';
        ctx.fillRect(this.x, this.y, this.w, this.h);
        ctx.shadowBlur = 0;
        
        // Detail
        ctx.fillStyle = '#000';
        ctx.fillRect(this.x + 10, this.y + 10, this.w - 20, this.h - 20);
    }
}

function gameLoop() {
    if (!state.isPlaying) return;

    // Clear with trail effect
    ctx.fillStyle = 'rgba(5, 5, 5, 0.4)';
    ctx.fillRect(0, 0, width, height);

    // Road Lines
    state.roadOffset = (state.roadOffset + state.speed * 2) % 100;
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 4;
    ctx.setLineDash([40, 60]);
    ctx.lineDashOffset = -state.roadOffset;
    ctx.beginPath();
    ctx.moveTo(width / 2, 0);
    ctx.lineTo(width / 2, height);
    ctx.stroke();
    ctx.setLineDash([]);

    // Car Physics
    if (input.left) car.vx -= 0.5;
    if (input.right) car.vx += 0.5;
    
    car.vx *= 0.9; // Friction
    car.x += car.vx;
    
    // Boundaries
    if (car.x < 0) { car.x = 0; car.vx = 0; }
    if (car.x > width - 40) { car.x = width - 40; car.vx = 0; }

    // Speed increase
    if (state.speed < state.maxSpeed) state.speed += 0.05;
    state.dist += state.speed / 10;

    // Drift Trail
    if (Math.abs(car.vx) > 1) {
        spawnTrail(car.x + 20, car.y + 40);
        spawnTrail(car.x + 20, car.y + 40);
    }

    // Draw Car
    ctx.save();
    ctx.translate(car.x + 20, car.y + 20);
    ctx.rotate(car.vx * 0.1); // Tilt when turning
    ctx.fillStyle = '#fff';
    ctx.shadowBlur = 20;
    ctx.shadowColor = '#fff';
    ctx.fillRect(-20, -20, 40, 40);
    ctx.restore();

    // Obstacles
    if (Math.random() < 0.02 + (state.dist / 5000)) {
        state.obstacles.push(new Obstacle());
    }

    state.obstacles = state.obstacles.filter(o => o.y < height + 100);
    state.obstacles.forEach(o => {
        o.update();
        o.draw();
        
        // Collision
        if (car.x < o.x + o.w && car.x + 40 > o.x && car.y < o.y + o.h && car.y + 40 > o.y) {
            gameOver();
        }
    });

    // Particles
    state.particles = state.particles.filter(p => p.life > 0);
    state.particles.forEach(p => { p.update(); p.draw(); });

    // UI Update
    document.getElementById('distDisplay').innerText = Math.floor(state.dist) + 'm';
    document.getElementById('speedDisplay').innerText = Math.floor(state.speed * 10) + ' km/h';

    requestAnimationFrame(gameLoop);
}

function startGame() {
    state = {
        isPlaying: true,
        dist: 0,
        speed: 5,
        maxSpeed: 15 + (Math.random() * 5),
        bestDist: state.bestDist,
        obstacles: [],
        particles: [],
        roadOffset: 0
    };
    car.x = width / 2 - 20;
    car.vx = 0;
    
    document.getElementById('startScreen').style.display = 'none';
    document.getElementById('gameOverScreen').style.display = 'none';
    gameLoop();
}

function gameOver() {
    state.isPlaying = false;
    if (state.dist > state.bestDist) {
        state.bestDist = state.dist;
        localStorage.setItem('neon_drift_best', state.bestDist.toString());
    }
    document.getElementById('finalDist').innerText = Math.floor(state.dist) + 'm';
    document.getElementById('bestDist').innerText = Math.floor(state.bestDist) + 'm';
    document.getElementById('gameOverScreen').style.display = 'block';
}

// Init
document.getElementById('bestDist').innerText = Math.floor(state.bestDist) + 'm';
</script>
</body>
</html>
